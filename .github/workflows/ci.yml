name: CI

on:
  push:
  pull_request:

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up conda env (environment.yml)
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: mle
          environment-file: environment.yml
          auto-activate-base: false

      - name: Install pip requirements (if present)
        shell: bash -l {0}
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Unit tests
        shell: bash -l {0}
        run: |
          pytest -q

      - name: Create tiny CI artifacts (so API can start)
        shell: bash -l {0}
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import numpy as np
          import joblib
          from sklearn.pipeline import Pipeline
          from sklearn.preprocessing import StandardScaler
          from sklearn.ensemble import IsolationForest
          from sklearn.svm import OneClassSVM

          from log_anomaly.modeling import anomaly_scores, threshold_percentile

          ART = Path("artifacts")
          ART.mkdir(parents=True, exist_ok=True)

          feature_cols = ["f1", "f2", "f3"]
          (ART / "feature_schema.json").write_text(
              json.dumps({"feature_columns": feature_cols}, indent=2),
              encoding="utf-8",
          )

          rng = np.random.RandomState(0)
          X = rng.normal(size=(300, len(feature_cols)))

          iforest = Pipeline([
              ("scaler", StandardScaler()),
              ("model", IsolationForest(n_estimators=50, random_state=0)),
          ]).fit(X)

          ocsvm = Pipeline([
              ("scaler", StandardScaler()),
              ("model", OneClassSVM(kernel="rbf", nu=0.05, gamma="scale")),
          ]).fit(X)

          joblib.dump(iforest, ART / "iforest.joblib")
          joblib.dump(ocsvm, ART / "ocsvm.joblib")

          thr_if = threshold_percentile(anomaly_scores(iforest, X), 95.0)
          thr_oc = threshold_percentile(anomaly_scores(ocsvm, X), 95.0)

          (ART / "thresholds.json").write_text(
              json.dumps(
                  {"iforest": {"threshold": float(thr_if)}, "ocsvm": {"threshold": float(thr_oc)}},
                  indent=2,
              ),
              encoding="utf-8",
          )
          print("Wrote CI artifacts to artifacts/")
          PY

      - name: Start API (background)
        shell: bash -l {0}
        run: |
          set -euo pipefail
          nohup uvicorn api:app --app-dir src --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          echo $! > uvicorn.pid
          sleep 1
          echo "Uvicorn PID: $(cat uvicorn.pid)"
          ps -p "$(cat uvicorn.pid)" || (echo "uvicorn failed to start"; echo "---- uvicorn.log ----"; cat uvicorn.log; exit 1)
          echo "---- uvicorn.log (tail) ----"
          tail -n 50 uvicorn.log || true

      - name: Smoke test API
        shell: bash -l {0}
        run: |
          python scripts/smoke_test_api.py || (echo "---- uvicorn.log ----"; cat uvicorn.log; exit 1)

      - name: Stop API
        if: always()
        shell: bash -l {0}
        run: |
          if [ -f uvicorn.pid ]; then kill "$(cat uvicorn.pid)" || true; fi
